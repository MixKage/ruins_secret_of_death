services:
  ruins-bot:
    build: .
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
      BOT_TEST_MODE: ${BOT_TEST_MODE:-0}
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000}
      API_BOT_TOKEN: ${API_BOT_TOKEN}
    networks:
      - api-network

networks:
  api-network:
    external: true
    name: ruins-network
