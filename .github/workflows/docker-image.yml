name: Build, Test, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Ручной запуск workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3


  deploy:
    runs-on: ubuntu-latest
    needs: build 

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install sshpass
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass

    - name: Deploy to server
      env:
        SSH_PASSWORD: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_HOST }} << 'EOF'
        set -e  # Выход при ошибке
        cd ./ruins_secret_of_death
        git pull
        docker compose build
        docker compose up -d
        EOF
